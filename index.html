<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioLivro Pro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">
   <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="screen-import" class="screen">
        <div class="import-wrap">
<h1>AudioLivro Pro</h1>
<p>Transforme PDFs e textos em audiolivros imersivos.
            </p>

            <div id="drop-zone" class="drop-zone" onclick="document.getElementById('file-input').click()">
<span>📄</span>
<p>Toque ou arraste seu arquivo aqui</p>
                <input type="file" id="file-input" accept=".pdf,.txt" hidden>
            </div>

            <div id="saved-section">
                <p>
                    Arquivos Recentes</p>
                <div id="book-list"></div>
            </div>
        </div>
    </div>

    <div id="screen-reader" class="screen" hidden>
<header>
            <button onclick="location.reload()">✕
                SAIR</button>
<div id="r-title">—</div>
        </header>

        <div id="reading-area" class="reading-area">
            <div id="reading-inner" class="reading-inner"></div>
        </div>

        <footer class="player">
            <div class="prog-track" id="prog-track" onclick="handleProgClick(event)">
<div class="prog-fill" id="prog-fill"></div>
            </div>
            <div class="player-row">
<span id="pos-txt">0
                    / 0</span>
<div>
                    <button class="cbtn" onclick="prev()">⏮</button>
                    <button class="pbtn" id="btn-play" onclick="togglePlay()">
<span id="play-icon">▶</span>
                    </button>
                    <button class="cbtn" onclick="next()">⏭</button>
                </div>
                <button onclick="cycleSpeed()" id="btn-spd">1.0x</button>
            </div>
        </footer>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

</body>
<script src="script.js"></script>
</html>
